<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Coupe du Monde 2026 - Team Platja d'Aro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    body {
      margin:0;
      font-family: Inter, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #050814);
      color:white;
    }

    .header {
      text-align:center;
      padding:25px;
    }

    .header h1 {
      font-size:26px;
      color:#00d4ff;
      margin:0;
    }

    .subtitle {
      opacity:0.7;
      margin-top:5px;
    }

    .card {
      background:#121a2b;
      margin:20px auto;
      padding:15px;
      border-radius:12px;
      max-width:1100px;
    }

    h2 {
      border-left:4px solid #00d4ff;
      padding-left:10px;
      margin-bottom:10px;
    }

    /* ========================= */
    /* RANKING FIX PROPRE */
    /* ========================= */

    #ranking {
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    #ranking p {
      background:#0b1220;
      padding:10px;
      border-radius:8px;

      display:flex;
      align-items:center;
      gap:12px;
    }

    /* bloc gauche (nom + classement) */
    .player-name {
      min-width:180px;
      font-weight:600;
      white-space:nowrap;
    }

    /* bloc centre (capital) */
    .player-score {
      min-width:120px;
      text-align:right;
      font-weight:600;
    }

    /* INPUT commentaire (IMPORTANT FIX) */
    .player-comment {
      flex:1;
      min-width:250px;   /* 👈 clé du problème */
      padding:6px;
      border-radius:5px;
      border:none;
    }

    /* ===================== */
    /* TABLE */
    /* ===================== */

    #table { overflow-x:auto; }

    table {
      width:100%;
      min-width:900px;
      border-collapse:collapse;
      background:#0b1220;
      border-radius:10px;
      overflow:hidden;
    }

    th {
      background:#1e293b;
      padding:8px;
      font-size:12px;
      text-align:center;
    }

    td {
      text-align:center;
      padding:6px;
      border-top:1px solid #1f2937;
    }

    input {
      width:55px;
      padding:4px;
      border-radius:5px;
      border:none;
      text-align:center;
    }

    button {
      margin-left:5px;
      padding:5px 8px;
      border:none;
      border-radius:6px;
      background:#334155;
      color:white;
      cursor:pointer;
    }

    button:hover {
      background:#00d4ff;
      color:black;
    }

    /* COMMENTS */
    .comment-box {
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    .comment-box input {
      flex:1;
      padding:8px;
      border-radius:6px;
      border:none;
    }

    .comment-box button {
      background:#00d4ff;
      color:black;
      font-weight:bold;
    }

    #comments {
      max-height:300px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:10px;
    }

    .comment {
      background:#0b1220;
      padding:8px;
      border-radius:6px;
    }

    .comment small {
      opacity:0.6;
    }
  </style>
</head>
<div class="card">
  <h2>⚽ Défi Jongles</h2>

  <p>
    Score : <span id="score">0</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Record : <span id="bestScore">0</span>
  </p>

  <button onclick="resetGame()">Recommencer</button>

  <div id="gameArea">
    <div id="ball" onclick="hitBall()">⚽</div>
  </div>
</div>
<body>

  <div class="header">
    <h1>🏆 Coupe du monde 2026 - Team Platja d'Aro</h1>
    <div class="subtitle">💰 Le gagnant payera sa tournée!</div>
  </div>

  <div class="card">
    <h2>📊 Classement des joueurs</h2>
    <div id="ranking"></div>
  </div>

  <div class="card">
    <h2>📅 Tableau des journées</h2>
    <div id="table"></div>
  </div>

  <div class="card">
    <h2>📈 Évolution des gains</h2>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h2>💬 Commentaires</h2>

    <div id="comments"></div>

    <div class="comment-box">
      <input id="commentInput" placeholder="Écrire un commentaire..." />
      <button onclick="addComment()">Envoyer</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="firebase.js"></script>
  <script src="app.js"></script>
  <script src="game.js"></script>

</body>
</html>
