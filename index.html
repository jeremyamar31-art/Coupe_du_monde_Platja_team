<style>
  body {
    margin:0;
    font-family: Inter, sans-serif;
    background: radial-gradient(circle at top, #0f172a, #050814);
    color:white;
  }

  .header {
    text-align:center;
    padding:25px;
  }

  .header h1 {
    font-size:26px;
    color:#00d4ff;
    margin:0;
  }

  .subtitle {
    opacity:0.7;
    margin-top:5px;
  }

  .card {
    background:#121a2b;
    margin:20px auto;
    padding:15px;
    border-radius:12px;
    max-width:1100px;
  }

  h2 {
    border-left:4px solid #00d4ff;
    padding-left:10px;
    margin-bottom:10px;
  }

  /* ========================= */
  /* RANKING FIX */
  /* ========================= */
  #ranking p {
    background:#0b1220;
    padding:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
  }

  #ranking span {
    white-space:nowrap;
  }

  #ranking input {
    flex:1;
    min-width:220px;   /* 👈 IMPORTANT */
    max-width:350px;
    padding:6px;
    border-radius:5px;
    border:none;
  }

  /* ===================== */
  /* TABLE */
  /* ===================== */
  #table { overflow-x:auto; }

  table {
    width:100%;
    min-width:900px;
    border-collapse:collapse;
    background:#0b1220;
    border-radius:10px;
    overflow:hidden;
  }

  th {
    background:#1e293b;
    padding:8px;
    font-size:12px;
    text-align:center;
  }

  td {
    text-align:center;
    padding:6px;
    border-top:1px solid #1f2937;
  }

  input {
    width:55px;
    padding:4px;
    border-radius:5px;
    border:none;
    text-align:center;
  }

  button {
    margin-left:5px;
    padding:5px 8px;
    border:none;
    border-radius:6px;
    background:#334155;
    color:white;
    cursor:pointer;
  }

  button:hover {
    background:#00d4ff;
    color:black;
  }

  .comment-box {
    display:flex;
    gap:10px;
    margin-top:10px;
  }

  .comment-box input {
    flex:1;
    padding:8px;
    border-radius:6px;
    border:none;
  }

  .comment-box button {
    background:#00d4ff;
    color:black;
    font-weight:bold;
  }

  #comments {
    max-height:300px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
  }

  .comment {
    background:#0b1220;
    padding:8px;
    border-radius:6px;
  }

  .comment small {
    opacity:0.6;
  }
</style>
